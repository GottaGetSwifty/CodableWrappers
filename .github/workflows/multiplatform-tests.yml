# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Multi-platform Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  macos-swift-test:
    name: latest macOS Swift tests
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: swift build -v
    - name: Run swift tests
      run: swift test -v

  macos-sonoma-swift-test:
    name: macOS Sonoma swift tests
    runs-on: macos-14.7
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: swift build -v
    - name: Run swift tests
      run: swift test -v

  ubuntu-swift-test:
    name: latest Ubuntu swift tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: swift build -v
    - name: Run swift tests
      run: swift test -v